<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1920px; overflow: hidden; background: transparent; }
  /* Gradient karartma kapatildi (kullanici karari): arka plan video oldugu
     gibi gozuksun, text-shadow ile metin okunabilirligi saglanir. */
  .gradient { position: absolute; inset: 0; background: transparent; }
</style>
</head>
<body>
  <div class="gradient"></div>
</body>
</html>
