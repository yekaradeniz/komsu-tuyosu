<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>benden içeri - mânâ</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1350px; overflow: hidden; }
  body {
    position: relative;
    background: #1a1a1a;
  }
  .post-bg {
    position: absolute; inset: 0;
    background-image: url('{{photoUrl}}');
    background-size: cover;
    background-position: center;
  }
  .post-overlay {
    position: absolute; inset: 0;
    background: rgba(0, 0, 0, 0.68);
  }
  .post-content {
    position: absolute; inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 110px 110px;
    z-index: 2;
  }
  .header {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 22px;
    letter-spacing: 11px;
    text-transform: uppercase;
    color: #d9c79a;
    opacity: 0.70;
    margin-bottom: 52px;
    text-align: center;
  }
  .divider {
    width: 90px;
    height: 2px;
    background: rgba(217, 199, 154, 0.40);
    margin: 0 auto 72px;
  }
  .explanation {
    font-family: 'Playfair Display', serif;
    font-weight: 400;
    font-style: normal;
    font-size: {{explanationFontSize}};
    line-height: 1.78;
    color: #e4dcc8;
    text-align: left;
    white-space: pre-line;
    flex: 1;
    text-shadow: 0 2px 12px rgba(0,0,0,0.7);
  }
  .footer-divider {
    width: 90px;
    height: 2px;
    background: rgba(217, 199, 154, 0.40);
    margin: 64px auto 36px;
  }
  .footer {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 24px;
    letter-spacing: 10px;
    text-transform: uppercase;
    color: #d9c79a;
    opacity: 0.70;
    text-align: center;
  }
</style>
</head>
<body>
  <div class="post-bg"></div>
  <div class="post-overlay"></div>
  <div class="post-content">
    <div class="header">Mânâ</div>
    <div class="divider"></div>
    <div class="explanation">{{explanation}}</div>
    <div class="footer-divider"></div>
    <div class="footer">Salih Baba</div>
  </div>
</body>
</html>
