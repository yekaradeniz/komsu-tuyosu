<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Inter:wght@900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1080px; height: 1920px; overflow: hidden; background: transparent;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: geometricPrecision;
  }
  .stage {
    position: absolute; left: 0; right: 0; bottom: 0;
    /* Reels safe zone: sag ~110px (ikon kolonu), alt ~380px (caption/share UI) */
    padding: 0 130px 400px 70px;
    text-align: center;
  }
  .verse-wrap {
    line-height: 1.5;
    transform: rotate(-1.5deg);
  }
  .verse {
    display: inline;
    font-family: 'Anton', 'Bebas Neue', 'Inter', sans-serif;
    font-weight: 400;
    font-size: {{verseFontSize}};
    line-height: 1.5;
    color: #ffffff;
    text-transform: uppercase;
    letter-spacing: 2px;
    background-color: #c62828;
    padding: 6px 22px;
    -webkit-box-decoration-break: clone;
    box-decoration-break: clone;
    text-shadow:
      0 0 0 #000,
      4px 4px 0 #1a0000,
      6px 6px 18px rgba(0,0,0,0.85),
      0 10px 28px rgba(0,0,0,0.75),
      0 0 36px rgba(0,0,0,0.55);
    -webkit-text-stroke: 1.5px #1a0000;
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="verse-wrap"><span class="verse" id="verse">{{verse}}</span></div>
  </div>
<script>
  (function() {
    const verse = document.querySelector('#verse');
    const wrap = document.querySelector('.verse-wrap');
    const stage = document.querySelector('.stage');
    let size = parseFloat(window.getComputedStyle(verse).fontSize);
    const minSize = 70;
    const maxHeight = 900;
    while ((wrap.offsetHeight > maxHeight || verse.getBoundingClientRect().width > stage.clientWidth) && size > minSize) {
      size -= 2;
      verse.style.fontSize = size + 'px';
    }
  })();
</script>
</body>
</html>
